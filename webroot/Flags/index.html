<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Control Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1f2233;
  --surface:#1a1d29;
  --surface-hover:#252a3a;
  --accent:#1592FF;
  --text:#fff;
  --text-secondary:#8b92a8;
  --success:#4dff88;
  --warning:#ffb84d;
  --danger:#ff6b6b;
  --border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  min-height:100vh;
  padding:16px;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

.container{max-width:420px;margin:0 auto}

.header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  padding:4px 0;
}

.header-icon{
  width:32px;
  height:32px;
  fill:var(--accent);
}

.header-text h1{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.3px;
}

.header-text p{
  font-size:13px;
  color:var(--text-secondary);
  margin-top:2px;
}

.stats{
  display:flex;
  gap:8px;
  margin-bottom:16px;
}

.stat{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  text-align:center;
  transition:transform 0.15s;
}

.stat:active{transform:scale(0.98)}

.stat-value{
  font-size:20px;
  font-weight:700;
  color:var(--accent);
}

.stat-label{
  font-size:11px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-top:2px;
}

.stat.reboot .stat-value{color:var(--warning)}
.stat.action .stat-value{color:var(--danger)}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  cursor:pointer;
  position:relative;
  transition:all 0.2s ease;
  min-height:110px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card:hover{background:var(--surface-hover)}

.card:active{transform:scale(0.97)}

.card.active{
  background:rgba(77,163,255,0.15);
  border-color:var(--accent);
}

.card-badge{
  position:absolute;
  top:10px;
  right:10px;
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  padding:3px 6px;
  border-radius:4px;
  background:rgba(255,255,255,0.1);
  color:var(--text-secondary);
}

.card-badge.reboot{background:rgba(255,184,77,0.2);color:var(--warning)}
.card-badge.action{background:rgba(255,107,107,0.2);color:var(--danger)}

.card-icon{
  width:28px;
  height:28px;
  fill:var(--text-secondary);
  transition:all 0.2s;
}

.card.active .card-icon{
  fill:var(--accent);
}

.card-title{
  font-size:14px;
  font-weight:600;
  margin-top:8px;
  line-height:1.2;
}

.card-desc{
  font-size:11px;
  color:var(--text-secondary);
  margin-top:4px;
  line-height:1.3;
}

.card-status{
  position:absolute;
  bottom:12px;
  right:12px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--text-secondary);
  transition:all 0.2s;
}

.card.active .card-status{
  background:var(--success);
  box-shadow:0 0 8px var(--success);
}

.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:12px 20px;
  border-radius:10px;
  font-size:13px;
  font-weight:500;
  z-index:1000;
  opacity:0;
  transition:all 0.3s ease;
  pointer-events:none;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

.toast.success{border-color:var(--success);color:var(--success)}

.footer{
  text-align:center;
  color:var(--text-secondary);
  font-size:12px;
  margin-top:24px;
  opacity:0.6;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <svg class="header-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    <div class="header-text">
      <h1>Control Centre</h1>
      <p>IntegrityBox Configuration</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat reboot">
      <div class="stat-value" id="stat-reboot">0</div>
      <div class="stat-label">Reboot</div>
    </div>
    <div class="stat action">
      <div class="stat-value" id="stat-action">0</div>
      <div class="stat-label">Action</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">IntegrityBox • 2026</div>
</div>

<div class="toast" id="toast"></div>

<script>
const DIR="/data/adb/Box-Brain";
const FILES=["noredirect","safemode","skip","rukja","iframe_gesture_right","iframe_back_button","NoLineageProp","gapps","override","ota","hma","download","root","nodebug","encrypt","lsposed","twrp","build","tag"];
const REBOOT_ITEMS=["nodebug","build","tag","twrp","rukja","safemode","skip","encrypt","NoLineageProp"];
const ACTION_ITEMS=["gapps","root","override","ota","hma","download","lsposed"];

const CONFIG=[
  {id:"NoLineageProp",icon:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z",title:"Spoof Lineage Props",desc:"Disable if camera fails",badge:"reboot"},
  {id:"nodebug",icon:"M20 8h-2.81c-.45-1.12-1.15-2.1-2.02-2.86l1.41-1.41L14.41 2.1 12.7 3.81c-.9-.52-1.93-.81-3.03-.81-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6c0-1.1-.29-2.13-.81-3.03l1.71-1.71 1.42 1.42c-.76.87-1.74 1.57-2.86 2.02V20c0 1.1.9 2 2 2h3v-2h-3v-2.16c1.74-.41 3.31-1.35 4.5-2.65V8z",title:"Debug Fingerprint",desc:"Hide custom ROM traces",badge:"reboot"},
  {id:"build",icon:"M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z",title:"Debug Build",desc:"Spoof to user build",badge:"reboot"},
  {id:"tag",icon:"M12.89 1.45l8 4c.6.3 1.1.9 1.1 1.55v9c0 .65-.5 1.25-1.1 1.55l-8 4c-.4.2-.9.2-1.3 0l-8-4c-.6-.3-1.1-.9-1.1-1.55v-9c0-.65.5-1.25 1.1-1.55l8-4c.4-.2.9-.2 1.3 0z",title:"Build Tag",desc:"Spoof to release-keys",badge:"reboot"},
  {id:"lsposed",icon:"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z",title:"Clear LSposed",desc:"Remove LSposed traces",badge:"action"},
  {id:"encrypt",icon:"M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z",title:"Spoof Encryption",desc:"Fake encryption status",badge:"reboot"},
  {id:"twrp",icon:"M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z",title:"Hide Recovery",desc:"Hide custom recovery",badge:"reboot"},
  {id:"gapps",icon:"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z",title:"Clear Gapps Logs",desc:"Wipe gapp logs",badge:"action"},
  {id:"iframe_gesture_right",icon:"M9.31 6.71c-.39.39-.39 1.02 0 1.41L13.19 12l-3.88 3.88c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l4.59-4.59c.39-.39.39-1.02 0-1.41L10.72 6.7c-.38-.38-1.02-.38-1.41.01z",title:"Right Gestures",desc:"Enable RHS back gestures",badge:""},
  {id:"iframe_back_button",icon:"M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z",title:"Floating Back",desc:"Add floating back button",badge:""},
  {id:"root",icon:"M10.54 11l-.54-.54L7.54 8 6 6.46 2.38 2.84 1.27 1.73 0 3l2.01 2.01L2 3.99c-1.06 0-1.99.74-1.99 2L0 16c0 1.26.74 2 2 2h15.46l2.29 2.29 1.41-1.41L10.54 11z",title:"Clear Module Logs",desc:"Wipe module logs",badge:"action"},
  {id:"download",icon:"M19 9h-4V3H9v6H5l7 7 7-7z",title:"Integrity Downloader",desc:"Download tools",badge:"action"},
  {id:"safemode",icon:"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z",title:"Safe Mode",desc:"Disable all extra features",badge:"reboot"},
  {id:"skip",icon:"M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z",title:"Skip System Patch",desc:"Do not spoof my device security patch",badge:"reboot"},
  {id:"rukja",icon:"M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z",title:"Disable AutoPilot",desc:"Stop auto updates",badge:"reboot"},
  {id:"noredirect",icon:"M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8z",title:"No Redirect",desc:"Disable Telegram redirects",badge:""},
  {id:"override",icon:"M4 6h18V4H4c-1.1 0-2 .9-2 2v11H0v3h14v-3H4V6zm19 2h-6c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h6c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1z",title:"Lineage v2",desc:"Manual Lineage spoof",badge:"action"},
  {id:"ota",icon:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z",title:"OTA Fix",desc:"Fix Lineage OTA errors",badge:"action"},
  {id:"hma",icon:"M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27z",title:"HMA Config",desc:"Inject HMA manually",badge:"action"}
];

const MESSAGES={
  noredirect:{on:"Redirect disabled",off:"Redirect enabled"},
  NoLineageProp:{on:"Lineage props spoofed",off:"Lineage props unchanged"},
  gapps:{on:"Gapp logs cleared",off:"Gapp logs enabled"},
  safemode:{on:"Safe mode active",off:"Safe mode disabled"},
  twrp:{on:"Custom recovery spoofed",off:"Custom recovery normal"},
  rukja:{on:"AutoPilot disabled",off:"AutoPilot enabled"},
  iframe_gesture_right:{on:"RHS gestures active",off:"RHS gestures disabled"},
  iframe_back_button:{on:"Floating button active",off:"Floating button disabled"},
  encrypt:{on:"Encryption spoofed",off:"Encryption normal"},
  lsposed:{on:"LSposed cleared",off:"LSposed normal"},
  nodebug:{on:"Debug fingerprint spoofed",off:"Debug fingerprint normal"},
  build:{on:"Debug build spoofed",off:"Debug build normal"},
  skip:{on:"Reboot your device to apply changes",off:"Reboot your device to apply changes"},
  tag:{on:"Build tag spoofed",off:"Build tag normal"},
  root:{on:"Module logs cleared",off:"Module logs normal"},
  override:{on:"Lineage v2 active",off:"Lineage v2 disabled"},
  ota:{on:"OTA fix active",off:"OTA fix disabled"},
  hma:{on:"HMA config injected",off:"HMA config normal"},
  download:{on:"Downloader active",off:"Downloader disabled"}
};

function toast(msg,type="info"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show"+(type==="success"?" success":"");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function runShell(cmd){
  return new Promise((resolve)=>{
    if(window.parent&&window.parent.runShellFromIframe){
      window.parent.runShellFromIframe(cmd).then(r=>resolve(r||"")).catch(()=>resolve(""));
    }else{
      resolve("");
    }
  });
}

async function toggle(id){
  const card=document.getElementById("card-"+id);
  const active=!card.classList.contains("active");
  
  if(active){
    await runShell('touch "'+DIR+"/"+id+'"');
    toast(MESSAGES[id].on,"success");
  }else{
    await runShell('rm -f "'+DIR+"/"+id+'"');
    toast(MESSAGES[id].off);
  }
  
  card.classList.toggle("active",active);
  updateStats();
}

function updateStats(){
  let active=0,reboot=0,action=0;
  FILES.forEach(f=>{
    if(document.getElementById("card-"+f).classList.contains("active")){
      active++;
      if(REBOOT_ITEMS.includes(f))reboot++;
      if(ACTION_ITEMS.includes(f))action++;
    }
  });
  document.getElementById("stat-active").textContent=active;
  document.getElementById("stat-reboot").textContent=reboot;
  document.getElementById("stat-action").textContent=action;
}

function createCard(cfg){
  const div=document.createElement("div");
  div.className="card";
  div.id="card-"+cfg.id;
  div.onclick=()=>toggle(cfg.id);
  
  const badge=cfg.badge?'<div class="card-badge '+cfg.badge+'">'+cfg.badge+'</div>':"";
  
  div.innerHTML=badge+'<svg class="card-icon" viewBox="0 0 24 24"><path d="'+cfg.icon+'"/></svg><div><div class="card-title">'+cfg.title+'</div><div class="card-desc">'+cfg.desc+'</div></div><div class="card-status"></div>';
  
  return div;
}

async function loadStates(){
  const cmd='for f in '+FILES.join(" ")+';do if [ -f "'+DIR+'/$f" ];then echo "$f:1";else echo "$f:0";fi;done';
  const result=await runShell(cmd);
  if(result){
    result.trim().split("\n").forEach(line=>{
      const[p,v]=line.split(":");
      if(p&&v)document.getElementById("card-"+p).classList.toggle("active",v.trim()==="1");
    });
  }
  updateStats();
}

function init(){
  const grid=document.getElementById("grid");
  CONFIG.forEach(c=>grid.appendChild(createCard(c)));
  setTimeout(loadStates,50);
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
