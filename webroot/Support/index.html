<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Support</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
* { box-sizing: border-box; }

:root {
  --bg1: #0f172a;
  --bg2: #1e293b;
  --card: rgba(30, 41, 59, 0.8);
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --text: #e2e8f0;
  --sub: #94a3b8;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.12), transparent),
              linear-gradient(180deg, var(--bg1), var(--bg2));
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}

.header {
  position: relative;
  padding: 48px 20px 32px;
  text-align: center;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
  pointer-events: none;
}

.heart-pulse {
  font-size: 52px;
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 20px rgba(99,102,241,0.4));
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.header h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header p {
  margin: 8px 0 0;
  color: var(--sub);
  font-size: 14px;
}

.stats-row {
  display: flex;
  gap: 12px;
  padding: 0 20px;
  margin-bottom: 24px;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}

.stat-pill {
  flex: 1;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.2);
  border-radius: 14px;
  padding: 14px 8px;
  text-align: center;
  backdrop-filter: blur(10px);
}

.stat-pill .num {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-pill .lbl {
  font-size: 11px;
  color: var(--sub);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.wrapper {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 20px;
}

.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  padding-left: 4px;
}

.section-label .line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(99,102,241,0.3), transparent);
}

.section-label span {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
}

.card {
  background: var(--card);
  border-radius: 20px;
  padding: 0;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  overflow: hidden;
  position: relative;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}

.card:hover {
  transform: translateY(-2px);
  border-color: rgba(99, 102, 241, 0.25);
  box-shadow: 0 8px 32px rgba(99, 102, 241, 0.12), 0 0 0 1px rgba(99, 102, 241, 0.08);
}

.card:active {
  transform: translateY(0) scale(0.98);
}

.card-top {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 16px 12px;
}

.icon-ring {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
}

.icon-ring::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  opacity: 0.3;
  z-index: -1;
}

.icon-ring .material-icons {
  font-size: 22px;
  color: white;
}

.card-info {
  flex: 1;
  min-width: 0;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.2px;
}

.card-sub {
  font-size: 12px;
  color: var(--sub);
  margin-top: 2px;
}

.qr-wrap {
  padding: 0 16px 12px;
}

.qr {
  width: 100%;
  max-width: 200px;
  margin: 0 auto;
  display: block;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
}

.addr-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 16px 16px;
  background: rgba(15, 23, 42, 0.6);
  border-radius: 14px;
  padding: 4px 4px 4px 14px;
  border: 1px solid rgba(255,255,255,0.05);
}

.addr-text {
  flex: 1;
  font-size: 12px;
  font-family: 'SF Mono', 'Courier New', monospace;
  color: var(--sub);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: -0.3px;
}

.copy-btn {
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  flex-shrink: 0;
}

.copy-btn:hover {
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
  transform: translateY(-1px);
}

.copy-btn:active {
  transform: scale(0.95);
}

.copy-btn .material-icons {
  font-size: 16px;
}

.footer-note {
  text-align: center;
  padding: 24px 20px;
  color: var(--sub);
  font-size: 12px;
}

.footer-note .material-icons {
  font-size: 14px;
  vertical-align: middle;
  margin-right: 4px;
  color: var(--accent);
}

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  padding: 12px 24px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
  z-index: 1000;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  animation: fadeUp 0.5s ease-out backwards;
}
</style>
</head>

<body>

<div class="header">
  <div class="heart-pulse">🤍</div>
  <h1>Support</h1>
  <p>Choose your preferred method to contribute</p>
</div>

<div class="stats-row">
  <div class="stat-pill">
    <div class="num" id="methodCount">9</div>
    <div class="lbl">Methods</div>
  </div>
  <div class="stat-pill">
    <div class="num" id="cryptoCount">8</div>
    <div class="lbl">Crypto</div>
  </div>
  <div class="stat-pill">
    <div class="num">1</div>
    <div class="lbl">Fiat</div>
  </div>
</div>

<div class="wrapper">
  <div class="section-label">
    <span>Payment Methods</span>
    <div class="line"></div>
  </div>
  <div id="list"></div>
</div>

<div class="footer-note">
  <span class="material-icons">security</span>
  All transactions are secure and anonymous
</div>

<div id="toast" class="toast">Copied to clipboard</div>

<script>
const toast = document.getElementById("toast");

function popup(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => popup("Copied to clipboard"));
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    popup("Copied to clipboard");
  }
}

const data = [
  {
    label: "Binance Pay",
    sub: "Fast & Easy",
    address: "69695263",
    qr: "https://raw.githubusercontent.com/MeowDump/Integrity-Box/old/DUMP/binance.png",
    icon: "payments"
  },
  {
    label: "TRC20 USDT",
    sub: "Tron Network",
    address: "TCfhyVTfJDw8gHQT8Ph7DknNgie6ZAH5Bt",
    icon: "currency_bitcoin"
  },
  {
    label: "BEP20 USDT",
    sub: "BNB Chain",
    address: "0x6b3f76339f2953db765dd2fb305784643e7d49df",
    icon: "token"
  },
  {
    label: "BNB Smart Chain",
    sub: "Native BNB",
    address: "0x33a6b33b40d54e83d88ca6f2f1ae8532248316eb",
    icon: "link"
  },
  {
    label: "Bitcoin",
    sub: "BTC Network",
    address: "bc1pt4hc00jkgf75f7hhwkume4utwux2jqwc0343zsnxafvqp6zfmtqqu4htfu",
    icon: "currency_bitcoin"
  },
  {
    label: "Ethereum",
    sub: "ERC20 / ETH",
    address: "0x33a6b33b40d54e83d88ca6f2f1ae8532248316eb",
    icon: "currency_exchange"
  },
  {
    label: "Solana",
    sub: "SOL Network",
    address: "CJhhei8bAWt4HinNofqxydVCXcGX1afDNKN9hwi1LoGR",
    icon: "bolt"
  },
  {
    label: "TON",
    sub: "The Open Network",
    address: "UQD1ppd0dcSK73HPd9uPYAXLxmtRuNY9tzzUt8t4_Z9K0kKb",
    icon: "send"
  },
  {
    label: "LiteCoin",
    sub: "LTC Network",
    address: "ltc1q4nywcj2l06rkat0nzccr9xj8hq9zsvhlwau80h",
    icon: "flash_on"
  }
];

const list = document.getElementById("list");

data.forEach((d, i) => {
  const el = document.createElement("div");
  el.className = "card";
  el.style.animationDelay = (i * 0.06) + "s";

  el.innerHTML = `
    <div class="card-top">
      <div class="icon-ring" style="background: linear-gradient(135deg, var(--accent), var(--accent2));">
        <span class="material-icons">${d.icon}</span>
      </div>
      <div class="card-info">
        <div class="card-title">${d.label}</div>
        <div class="card-sub">${d.sub}</div>
      </div>
    </div>

    ${d.qr ? `<div class="qr-wrap"><img src="${d.qr}" class="qr" alt="${d.label} QR"></div>` : ""}

    <div class="addr-bar">
      <span class="addr-text">${d.address}</span>
      <button class="copy-btn" data="${d.address}">
        <span class="material-icons">content_copy</span>
        Copy
      </button>
    </div>
  `;

  list.appendChild(el);
});

document.addEventListener("click", e => {
  const btn = e.target.closest(".copy-btn");
  if (!btn) return;

  const text = btn.getAttribute("data");
  copyText(text);

  const original = btn.innerHTML;
  btn.innerHTML = `<span class="material-icons">check</span>Done`;
  btn.style.background = "linear-gradient(135deg, #22c55e, #16a34a)";

  setTimeout(() => {
    btn.innerHTML = original;
    btn.style.background = "";
  }, 1500);
});
</script>

</body>
</html>
